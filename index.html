<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="Dbs - Plateforme de cybersécurité offrant des capacités unifiées d'OSINT et de recherche sur le dark web" />
    <meta name="theme-color" content="#000000" />

    <!-- Security headers (compatibles meta) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Content Security Policy (VITE / REACT SAFE) - HARDENED -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src
        'self'
        'unsafe-inline'
        'unsafe-eval'
        https://unpkg.com
        https://static.cloudflareinsights.com
        https://challenges.cloudflare.com
        https://api.ipify.org
        https://discord.com
        https://wbvbjfabddvtsmmeidzb.supabase.co;
      style-src
        'self'
        'unsafe-inline'
        https://fonts.googleapis.com
        https://cdnjs.cloudflare.com;
      font-src
        'self'
        https://fonts.gstatic.com
        https://cdnjs.cloudflare.com
        data:;
      img-src
        'self'
        data:
        blob:
        https:;
      connect-src
        'self'
        https://*.supabase.co
        wss://*.supabase.co
        https://supabase-proxy.tiny-wave-2fa1.workers.dev
        wss://supabase-proxy.tiny-wave-2fa1.workers.dev
        https://challenges.cloudflare.com
        https://api.ipify.org
        https://discord.com
        https://wbvbjfabddvtsmmeidzb.supabase.co;
      frame-src
        'self'
        https://challenges.cloudflare.com
        https://api.ipify.org
        https://discord.com
        https://wbvbjfabddvtsmmeidzb.supabase.co;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
    " />

    <!-- Additional Security Headers -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" />

    <title>Dbs - OSINT & Dark Web Search Platform</title>

    <!-- Fonts & icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

      rel="stylesheet"

    />
